version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.10-browsers
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: pip install selenium webdriver-manager
      - run:
          name: Run Bot Directly
          command: |
            # Menjalankan skrip bot utama langsung menggunakan Python
            python bot.py
      
      # 🔄 RE-RUN JALUR TUNGGAL AUTOMATIS
      - run:
          name: Auto Trigger New Workflow (On Success or Failure)
          when: always
          command: |
            echo "🤖 Prosedur selesai/gagal. Memicu putaran berikutnya..."
            
            curl -X POST "https://circleci.com/api/v2/project/gh/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pipeline" \
              -H "Circle-Token: CCIPAT_XgQi3sTvovUc1PgSaD3Mzn_f09d2af95c52c90cd805975af06ef29121e5d733" \
              -H "Content-Type: application/json" \
              -d "{\"branch\": \"${CIRCLE_BRANCH}\"}"
              
            echo "✅ Putaran estafet berikutnya berhasil masuk antrean."

workflows:
  main_workflow:
    jobs:
      - build
